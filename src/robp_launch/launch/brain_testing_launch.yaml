%YAML 1.2
---
launch:

  # ODOM TO BASE TF
  - node:
      pkg: "tf2_ros"
      exec: "static_transform_publisher"
      name: "odom_to_base"
      args: "0 0 0 0 0 0 odom base_link"
      output: "screen"

  # Dummy server
  - node:
      pkg: "brian"
      exec: "dummy_server"
      name: "dummy_server"
      output: "screen"

  # Mapping
  - node:
      pkg: "napping"
      exec: "mapping"
      name: "mapping"
      output: "screen"

      